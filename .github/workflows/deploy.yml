name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Prepare deployment
        run: |
          set -euo pipefail
          mkdir -p _site

          # Pflicht-Files am Root (jeweils einzeln, damit ein fehlendes File nicht den ganzen Step kippt)
          for f in index.html robots.txt sitemap.xml CNAME; do
            [ -f "$f" ] && cp "$f" _site/
          done

          # Pflicht-Verzeichnisse am Root
          for d in assets css js; do
            [ -d "$d" ] && cp -r "$d" _site/
          done

          # Statische Unterseiten
          for d in services projects contact impressum datenschutz 3d-hero; do
            [ -d "$d" ] && cp -r "$d" _site/
          done

          # Discovery-Formulare (Obscure-Paths d-*) — automatisch alle mitnehmen
          shopt -s nullglob
          for d in d-*/; do
            cp -r "$d" _site/
          done
          shopt -u nullglob

          echo "Inhalt von _site/:" && ls -la _site/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
